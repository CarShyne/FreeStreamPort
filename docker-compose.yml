version: '3.8'

services:
  freestream:
    build: .
    container_name: freestream
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ${MEDIA_PATH:-/mnt/media/movies}:/media/movies:ro
      - ${TV_PATH:-/mnt/media/tvshows}:/media/tvshows:ro
      - freestream-settings:/app/server
      - /tmp/freestream-hls:/tmp/freestream-hls
    environment:
      - MEDIA_FOLDER=/media/movies
      - TV_FOLDER=/media/tvshows
      - PORT=3000
      - TMDB_API_KEY=866794356a9e7ac61771ae56bd99e284

volumes:
  freestream-settings:
