version: '3.8'

services:
  freestream:
    build: .
    container_name: freestream
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /srv/dev-disk-by-uuid-ef6d3ece-2b16-4ae0-bda5-3c5fe4d26ebc/2TB/Movies.2TB:/media/movies
      - /srv/dev-disk-by-uuid-ef6d3ece-2b16-4ae0-bda5-3c5fe4d26ebc/2TB/Movies.2TB/TV Shows:/media/tvshows
      - freestream-hls:/tmp/freestream-hls
    environment:
      - MEDIA_FOLDER=/media/movies
      - TV_FOLDER=/media/tvshows
      - PORT=3000
      - TMDB_API_KEY=866794356a9e7ac61771ae56bd99e284

volumes:
  freestream-settings:
