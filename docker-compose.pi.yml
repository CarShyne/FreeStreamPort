# Raspberry Pi 4/5 — pass V4L2 + DRM devices for hardware H.264 encode (h264_v4l2m2m)
# Usage: docker compose -f docker-compose.pi.yml up -d --build
#
# Verify on the Pi host first:
#   ls -la /dev/video* /dev/dri
#   ffmpeg -encoders 2>/dev/null | grep v4l2m2m
#
# If encode fails, check container logs for "Video encoder: v4l2m2m/h264_v4l2m2m"

version: '3.8'

services:
  freestream:
    build: .
    container_name: freestream
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ${MEDIA_PATH:-/mnt/media/movies}:/media/movies
      - ${TV_PATH:-/mnt/media/tvshows}:/media/tvshows
      - freestream-hls:/tmp/freestream-hls
      - freestream-data:/data
    devices:
      - /dev/dri:/dev/dri
    device_cgroup_rules:
      - 'c 81:* rmw'
    group_add:
      - video
    environment:
      MEDIA_FOLDER: /media/movies
      TV_FOLDER: /media/tvshows
      PORT: "3000"
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      FREESTREAM_USER: ${FREESTREAM_USER:-admin}
      FREESTREAM_PASSWORD: ${FREESTREAM_PASSWORD:-admin}
      FREESTREAM_DATA_DIR: /data
      FREESTREAM_HW_ENCODER: v4l2m2m

volumes:
  freestream-hls:
  freestream-data:
