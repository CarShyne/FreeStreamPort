<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>FreeStream Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #000;
            overflow: hidden;
        }
        #player-wrap {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #000;
        }
        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            background: #000;
        }
        video.fill-tv { object-fit: cover; }
        html:fullscreen #player-wrap,
        html:-webkit-full-screen #player-wrap {
            width: 100%;
            height: 100%;
        }
        html:fullscreen video,
        html:-webkit-full-screen video,
        video:fullscreen,
        video:-webkit-full-screen {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        html:fullscreen video.fill-tv,
        video:fullscreen.fill-tv { object-fit: cover; }
        #loading {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Advent Pro', sans-serif;
            font-size: 16px;
            background: #000;
        }
        .player-btn {
            position: fixed;
            z-index: 999;
            height: 40px;
            min-width: 40px;
            padding: 0 14px;
            border-radius: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85);
            font-family: 'Advent Pro', sans-serif;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s, background 0.2s;
        }
        body.show-controls .player-btn { opacity: 1; }
        .player-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        #close-btn { bottom: 80px; left: 24px; }
        #fullscreen-btn { bottom: 80px; left: 76px; }
        #fit-btn { bottom: 80px; left: 168px; }
    </style>
</head>
<body>
<button id="close-btn" class="player-btn" onclick="window.close()">✕</button>
<button id="fullscreen-btn" class="player-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
<button id="fit-btn" class="player-btn" onclick="toggleFit()">Fit: Letterbox</button>
<div id="loading">Preparing stream...</div>
<div id="player-wrap">
    <video id="player" controls autoplay playsinline webkit-playsinline preload="auto" x-webkit-airplay="allow" airplay="allow"></video>
</div>
<script src="/vendor/hls.js/dist/hls.min.js"></script>
<script>
    const file = new URLSearchParams(window.location.search).get('file');
    const loading = document.getElementById('loading');
    const player = document.getElementById('player');
    let hlsInstance = null;
    let fillTv = localStorage.getItem('freestream-fill-tv') === '1';

    function applyFitMode() {
        player.classList.toggle('fill-tv', fillTv);
        document.getElementById('fit-btn').textContent = fillTv ? 'Fit: Fill TV' : 'Fit: Letterbox';
    }

    function toggleFit() {
        fillTv = !fillTv;
        localStorage.setItem('freestream-fill-tv', fillTv ? '1' : '0');
        applyFitMode();
        showControls();
    }

    function toggleFullscreen() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
        } else {
            enterFullscreen();
        }
        showControls();
    }

    function enterFullscreen() {
        const el = document.documentElement;
        return (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);
    }

    function showError(message) {
        loading.style.display = 'flex';
        loading.textContent = message;
    }

    function mediaUrl(path) {
        return path.split('/').map(encodeURIComponent).join('/');
    }

    const HLS_START_BUFFER_SEC = 10;
    const MP4_START_BUFFER_SEC = 4;
    let playbackStarted = false;

    function bufferedAhead() {
        const ranges = player.buffered;
        if (!ranges.length) return 0;
        return ranges.end(ranges.length - 1) - player.currentTime;
    }

    function showBuffering() {
        loading.style.display = 'flex';
        loading.textContent = 'Buffering...';
    }

    function bufferTarget(minSeconds) {
        const duration = player.duration;
        if (!isNaN(duration) && isFinite(duration) && duration < minSeconds) {
            return Math.max(0.5, duration * 0.4);
        }
        return minSeconds;
    }

    function tryStartPlayback(minSeconds) {
        if (playbackStarted) return;
        if (bufferedAhead() >= bufferTarget(minSeconds)) {
            playbackStarted = true;
            loading.style.display = 'none';
            player.play().catch(() => {});
        }
    }

    function playDirect(url) {
        playbackStarted = false;
        loading.textContent = 'Loading...';
        loading.style.display = 'flex';
        player.src = url;
        const onProgress = () => tryStartPlayback(MP4_START_BUFFER_SEC);
        player.addEventListener('progress', onProgress);
        player.addEventListener('canplaythrough', onProgress, { once: true });
        player.addEventListener('loadedmetadata', onProgress, { once: true });
        player.addEventListener('waiting', showBuffering);
        player.addEventListener('playing', () => {
            if (playbackStarted) loading.style.display = 'none';
        });
        player.addEventListener('error', () => {
            startHlsStream();
        }, { once: true });
    }

    function playHls(url) {
        playbackStarted = false;
        if (window.Hls && Hls.isSupported()) {
            if (hlsInstance) hlsInstance.destroy();
            hlsInstance = new Hls({
                enableWorker: true,
                lowLatencyMode: false,
                backBufferLength: 90,
                maxBufferLength: 90,
                maxMaxBufferLength: 600,
                maxBufferSize: 120 * 1000 * 1000,
                maxBufferHole: 0.5,
                highBufferWatchdogPeriod: 3,
                nudgeOffset: 0.1,
                startFragPrefetch: true,
                testBandwidth: false,
                liveDurationInfinity: true,
                liveSyncMode: 'buffered',
                maxLiveSyncPlaybackRate: 1,
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(player);
            const onBuffered = () => tryStartPlayback(HLS_START_BUFFER_SEC);
            hlsInstance.on(Hls.Events.BUFFER_APPENDED, onBuffered);
            hlsInstance.on(Hls.Events.FRAG_BUFFERED, onBuffered);
            player.addEventListener('waiting', showBuffering);
            player.addEventListener('playing', () => {
                if (playbackStarted) loading.style.display = 'none';
            });
            hlsInstance.on(Hls.Events.ERROR, (_, data) => {
                if (!data.fatal) {
                    if (data.details === Hls.ErrorDetails.BUFFER_STALLED_ERROR) {
                        showBuffering();
                    }
                    return;
                }
                if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                    hlsInstance.recoverMediaError();
                    return;
                }
                showError('Stream failed to load');
            });
            setTimeout(() => {
                if (!playbackStarted && bufferedAhead() > 0.5) tryStartPlayback(0.5);
            }, 45000);
            return;
        }
        if (player.canPlayType('application/vnd.apple.mpegurl')) {
            playbackStarted = false;
            loading.style.display = 'flex';
            loading.textContent = 'Loading...';
            player.src = url;
            player.addEventListener('progress', () => tryStartPlayback(HLS_START_BUFFER_SEC));
            player.addEventListener('waiting', showBuffering);
            player.addEventListener('playing', () => {
                if (playbackStarted) loading.style.display = 'none';
            });
            return;
        }
        showError('HLS not supported in this browser');
    }

    async function startHlsStream() {
        playbackStarted = false;
        const tvfile = new URLSearchParams(window.location.search).get('tvfile');
        loading.style.display = 'flex';
        loading.textContent = 'Preparing stream...';
        player.removeAttribute('src');
        player.load();

        const endpoint = tvfile
            ? '/start-stream?tvfile=' + encodeURIComponent(tvfile)
            : '/start-stream?file=' + encodeURIComponent(file);
        const res = await fetch(endpoint);
        if (!res.ok) {
            showError('Could not start stream');
            return;
        }
        const { url } = await res.json();
        playHls(url);
    }

    async function startStream() {
        const tvfile = new URLSearchParams(window.location.search).get('tvfile');
        const target = tvfile || file;
        if (!target) {
            showError('No file specified');
            return;
        }

        if (target.toLowerCase().endsWith('.mp4')) {
            const url = tvfile
                ? '/tv-media/' + mediaUrl(tvfile)
                : '/stream-mp4?file=' + encodeURIComponent(file);
            playDirect(url);
            return;
        }

        await startHlsStream();
    }

    let hideTimer;
    function showControls() {
        document.body.classList.add('show-controls');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => document.body.classList.remove('show-controls'), 3000);
    }

    document.addEventListener('mousemove', showControls);
    document.addEventListener('touchstart', showControls);
    player.addEventListener('dblclick', toggleFullscreen);
    document.addEventListener('fullscreenchange', showControls);
    document.addEventListener('webkitfullscreenchange', showControls);

    applyFitMode();
    showControls();
    startStream();

    // Fullscreen helps tab/screen cast fill the TV instead of mirroring a small window
    enterFullscreen().catch(() => {});
</script>
</body>
</html>
