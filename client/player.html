<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FreeStream Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Advent Pro', sans-serif;
            font-size: 16px;
            background: #000;
        }
        #close-btn {
            position: fixed;
            bottom: 80px;
            left: 24px;
            z-index: 999;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s, background 0.2s;
        }
        body:hover #close-btn { opacity: 1; }
        #close-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>
<button id="close-btn" onclick="window.close()">✕</button>
<div id="loading">Preparing stream...</div>
<video id="player" controls autoplay x-webkit-airplay="allow"></video>
<script>
    const file = new URLSearchParams(window.location.search).get('file');
    const loading = document.getElementById('loading');
    const player = document.getElementById('player');

    async function startStream() {
        const tvfile = new URLSearchParams(window.location.search).get('tvfile');
        const target = tvfile || file;
        if (!target) return;

        if (target.toLowerCase().endsWith('.mp4')) {
            loading.style.display = 'none';
            if (tvfile) {
                player.src = 'http://192.168.0.121:3000/tv-media/' + tvfile;
            } else {
                player.src = 'http://192.168.0.121:3000/stream-mp4?file=' + encodeURIComponent(file);
            }
            return;
        }
        const endpoint = tvfile ? '/start-stream?tvfile=' + tvfile : '/start-stream?file=' + encodeURIComponent(file);
        const res = await fetch(endpoint);
        const { url } = await res.json();
        loading.style.display = 'none';
        player.src = url;
    }

    // Auto-hide controls
    let hideTimer;
    function showControls() {
        document.getElementById('close-btn').style.opacity = '1';
        document.getElementById('audio-btn').style.opacity = '1';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            document.getElementById('close-btn').style.opacity = '0';
            document.getElementById('audio-btn').style.opacity = '0';
        }, 3000);
    }
    document.addEventListener('mousemove', showControls);
    document.addEventListener('touchstart', showControls);

    startStream();
</script>
</body>
</html>
