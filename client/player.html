<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FreeStream Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }
        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Advent Pro', sans-serif;
            font-size: 16px;
            background: #000;
        }
        #close-btn {
            position: fixed;
            bottom: 80px;
            left: 24px;
            z-index: 999;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s, background 0.2s;
        }
        body:hover #close-btn { opacity: 1; }
        #close-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>
<button id="close-btn" onclick="window.close()">✕</button>
<div id="loading">Preparing stream...</div>
<video id="player" controls autoplay playsinline x-webkit-airplay="allow"></video>
<script src="/vendor/hls.js/dist/hls.min.js"></script>
<script>
    const file = new URLSearchParams(window.location.search).get('file');
    const loading = document.getElementById('loading');
    const player = document.getElementById('player');

    function showError(message) {
        loading.style.display = 'flex';
        loading.textContent = message;
    }

    function playHls(url) {
        if (window.Hls && Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(player);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                loading.style.display = 'none';
                player.play().catch(() => {});
            });
            hls.on(Hls.Events.ERROR, (_, data) => {
                if (data.fatal) showError('Stream failed to load');
            });
            return;
        }
        if (player.canPlayType('application/vnd.apple.mpegurl')) {
            player.src = url;
            loading.style.display = 'none';
            player.play().catch(() => {});
            return;
        }
        showError('HLS not supported in this browser');
    }

    async function startStream() {
        const tvfile = new URLSearchParams(window.location.search).get('tvfile');
        const target = tvfile || file;
        if (!target) {
            showError('No file specified');
            return;
        }

        player.addEventListener('error', () => showError('Could not play video'));

        if (target.toLowerCase().endsWith('.mp4')) {
            if (tvfile) {
                player.src = '/tv-media/' + encodeURI(tvfile);
            } else {
                player.src = '/stream-mp4?file=' + encodeURIComponent(file);
            }
            loading.style.display = 'none';
            player.play().catch(() => {});
            return;
        }

        const endpoint = tvfile
            ? '/start-stream?tvfile=' + encodeURIComponent(tvfile)
            : '/start-stream?file=' + encodeURIComponent(file);
        const res = await fetch(endpoint);
        if (!res.ok) {
            showError('Could not start stream');
            return;
        }
        const { url } = await res.json();
        playHls(url);
    }

    let hideTimer;
    function showControls() {
        document.getElementById('close-btn').style.opacity = '1';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
            document.getElementById('close-btn').style.opacity = '0';
        }, 3000);
    }
    document.addEventListener('mousemove', showControls);
    document.addEventListener('touchstart', showControls);

    startStream();
</script>
</body>
</html>
