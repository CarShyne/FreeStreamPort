<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>FreeStream Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Advent+Pro:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #000;
            overflow: hidden;
        }
        #player-wrap {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #000;
        }
        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            background: #000;
        }
        video.fill-tv { object-fit: cover; }
        html:fullscreen #player-wrap,
        html:-webkit-full-screen #player-wrap {
            width: 100%;
            height: 100%;
        }
        html:fullscreen video,
        html:-webkit-full-screen video,
        video:fullscreen,
        video:-webkit-full-screen {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        html:fullscreen video.fill-tv,
        video:fullscreen.fill-tv { object-fit: cover; }
        #loading {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Advent Pro', sans-serif;
            font-size: 16px;
            background: #000;
        }
        #loading.rebuffer {
            pointer-events: none;
            background: transparent;
        }
        .player-btn {
            position: fixed;
            z-index: 999;
            height: 40px;
            min-width: 40px;
            padding: 0 14px;
            border-radius: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.85);
            font-family: 'Advent Pro', sans-serif;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s, background 0.2s;
        }
        body.show-controls .player-btn { opacity: 1; }
        .player-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
        /* env() is 0 on desktop — only shifts on notched iPhones */
        #close-btn { bottom: calc(80px + env(safe-area-inset-bottom)); left: calc(24px + env(safe-area-inset-left)); }
        #fullscreen-btn { bottom: calc(80px + env(safe-area-inset-bottom)); left: calc(76px + env(safe-area-inset-left)); }
        #fit-btn { bottom: calc(80px + env(safe-area-inset-bottom)); left: calc(168px + env(safe-area-inset-left)); }
    </style>
</head>
<body>
<button id="close-btn" class="player-btn" onclick="window.close()">✕</button>
<button id="fullscreen-btn" class="player-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
<button id="fit-btn" class="player-btn" onclick="toggleFit()">Fit: Letterbox</button>
<div id="loading">Preparing stream...</div>
<div id="player-wrap">
    <video id="player" controls autoplay playsinline webkit-playsinline preload="auto" x-webkit-airplay="allow" airplay="allow"></video>
</div>
<script src="/vendor/hls.js/dist/hls.min.js"></script>
<script>
    async function ensureAuth() {
        const res = await fetch('/api/auth/status', { credentials: 'same-origin' });
        const { authenticated } = await res.json();
        if (!authenticated) {
            window.location.replace('/');
            return false;
        }
        return true;
    }

    const file = new URLSearchParams(window.location.search).get('file');
    const loading = document.getElementById('loading');
    const player = document.getElementById('player');
    let hlsInstance = null;
    let fillTv = localStorage.getItem('freestream-fill-tv') === '1';

    function applyFitMode() {
        player.classList.toggle('fill-tv', fillTv);
        document.getElementById('fit-btn').textContent = fillTv ? 'Fit: Fill TV' : 'Fit: Letterbox';
    }

    function toggleFit() {
        fillTv = !fillTv;
        localStorage.setItem('freestream-fill-tv', fillTv ? '1' : '0');
        applyFitMode();
        showControls();
    }

    function toggleFullscreen() {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
        } else if (player.webkitDisplayingFullscreen) {
            try { player.webkitExitFullscreen(); } catch (_) {}
        } else {
            enterFullscreen();
        }
        showControls();
    }

    function enterFullscreen() {
        const el = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) {
            const r = req.call(el);
            if (r && r.catch) r.catch(() => enterVideoFullscreen());
            return r;
        }
        // iPhone Safari: page fullscreen unsupported — use the video element's
        // native fullscreen (hides tabs/URL bar completely)
        return enterVideoFullscreen();
    }

    function enterVideoFullscreen() {
        try {
            if (player.webkitEnterFullscreen) player.webkitEnterFullscreen();
        } catch (_) {}
    }

    function showError(message) {
        loading.style.display = 'flex';
        loading.textContent = message;
    }

    function mediaUrl(path) {
        return path.split('/').map(encodeURIComponent).join('/');
    }

    let mediaToken = null;
    async function getMediaToken() {
        if (mediaToken) return mediaToken;
        try {
            const res = await fetch('/api/media-token', { credentials: 'same-origin' });
            if (res.ok) mediaToken = (await res.json()).token;
        } catch (_) {}
        return mediaToken;
    }

    function withToken(url, token) {
        if (!token) return url;
        return url + (url.includes('?') ? '&' : '?') + 'token=' + token;
    }

    const HLS_START_BUFFER_SEC = 15;
    const HLS_START_BUFFER_COPY_SEC = 8;
    const HLS_START_BUFFER_NATIVE_SEC = 25;
    const HLS_START_BUFFER_NATIVE_COPY_SEC = 12;
    const MP4_START_BUFFER_SEC = 5;
    const HLS_MIN_PLAY_BUFFER_SEC = 8;
    const HLS_MIN_PLAY_COPY_SEC = 5;
    const HLS_RESUME_BUFFER_SEC = 15;
    const HLS_RESUME_COPY_SEC = 10;
    const HLS_ENCODE_LEAD_SEC = 20;
    const HLS_ENCODE_LEAD_COPY_SEC = 8;
    let playbackStarted = false;
    let stallTimer = null;
    let bufferWatchdog = null;
    let encodeLeadTimer = null;
    let mediaRecoveries = 0;
    let playerListenersBound = false;
    let pausedForBuffer = false;
    let hlsStreamId = null;
    let encodedAheadSec = Infinity;
    let lastEncodedSeconds = Infinity;
    let hlsCopyMode = false;
    let usingNativeHls = false;
    let liveEdgeFixInterval = null;
    let streamTimeOffset = 0;
    let seekRestartBound = false;
    let seekRestartInProgress = false;

    function hlsStartBufferSec() {
        if (usingNativeHls) {
            return hlsCopyMode ? HLS_START_BUFFER_NATIVE_COPY_SEC : HLS_START_BUFFER_NATIVE_SEC;
        }
        return hlsCopyMode ? HLS_START_BUFFER_COPY_SEC : HLS_START_BUFFER_SEC;
    }

    function hlsMinPlayBufferSec() {
        return hlsCopyMode ? HLS_MIN_PLAY_COPY_SEC : HLS_MIN_PLAY_BUFFER_SEC;
    }

    function hlsResumeBufferSec() {
        return hlsCopyMode ? HLS_RESUME_COPY_SEC : HLS_RESUME_BUFFER_SEC;
    }

    function hlsEncodeLeadSec() {
        return hlsCopyMode ? HLS_ENCODE_LEAD_COPY_SEC : HLS_ENCODE_LEAD_SEC;
    }

    function bufferedAhead() {
        const ranges = player.buffered;
        if (!ranges.length) return 0;
        return ranges.end(ranges.length - 1) - player.currentTime;
    }

    function showInitialLoading(text) {
        loading.classList.remove('rebuffer');
        loading.style.display = 'flex';
        loading.textContent = text || 'Loading...';
    }

    function showRebuffering() {
        if (!playbackStarted) return;
        loading.classList.add('rebuffer');
        loading.style.display = 'flex';
        loading.textContent = 'Buffering...';
    }

    function hideLoading() {
        loading.style.display = 'none';
        loading.classList.remove('rebuffer');
        clearTimeout(stallTimer);
    }

    function bufferTarget(minSeconds) {
        const duration = player.duration;
        if (!isNaN(duration) && isFinite(duration) && duration < minSeconds) {
            return Math.max(0.5, duration * 0.4);
        }
        return minSeconds;
    }

    function isStuckAtLiveEdge() {
        const ct = player.currentTime;
        const d = player.duration;
        if (!isFinite(d) || d <= 0) return ct > 15;
        if (ct > d * 0.7) return true;
        if (!playbackStarted && ct > 20 && bufferedAhead() < hlsStartBufferSec()) return true;
        return false;
    }

    function forceStartFromBeginning() {
        if (player.currentTime > 0.25) {
            try { player.currentTime = 0; } catch (_) {}
        }
    }

    function bufferAnchorIsNearStart() {
        const ranges = player.buffered;
        if (!ranges.length) return false;
        return ranges.start(0) < 8;
    }

    function hasBufferFromPlayhead(minSeconds) {
        const ahead = bufferedAhead();
        if (ahead < bufferTarget(minSeconds)) return false;
        const ct = player.currentTime;
        if (!playbackStarted && ct > 3) return false;
        if (!playbackStarted && !bufferAnchorIsNearStart()) return false;
        return true;
    }

    function tryStartPlayback(minSeconds, strict) {
        if (playbackStarted) return;
        const encodeReady = !hlsStreamId || encodedAheadSec >= hlsEncodeLeadSec();
        const strictMode = strict || usingNativeHls;

        if (isStuckAtLiveEdge()) {
            showInitialLoading('Starting from beginning...');
            forceStartFromBeginning();
            return;
        }

        if (strictMode) {
            if (!hasBufferFromPlayhead(minSeconds) || !encodeReady) return;
            forceStartFromBeginning();
            playbackStarted = true;
            hideLoading();
            player.play().catch(() => showTapToPlay());
            return;
        }

        const ahead = bufferedAhead();
        if ((ahead >= bufferTarget(minSeconds) || player.readyState >= 3) && encodeReady) {
            playbackStarted = true;
            hideLoading();
            player.play().catch(() => showTapToPlay());
        }
    }

    function startLiveEdgeGuard() {
        if (liveEdgeFixInterval) clearInterval(liveEdgeFixInterval);
        liveEdgeFixInterval = setInterval(() => {
            if (playbackStarted) {
                clearInterval(liveEdgeFixInterval);
                liveEdgeFixInterval = null;
                return;
            }
            if (isStuckAtLiveEdge()) {
                showInitialLoading('Starting from beginning...');
                forceStartFromBeginning();
            }
        }, 250);
    }

    function scheduleStallRecovery() {
        clearTimeout(stallTimer);
        stallTimer = setTimeout(() => {
            if (!playbackStarted || player.ended) return;
            if (hlsInstance) hlsInstance.startLoad();
            if (player.paused && !pausedForBuffer) player.play().catch(() => {});
        }, 1500);
    }

    function startBufferWatchdog() {
        if (bufferWatchdog) clearInterval(bufferWatchdog);
        bufferWatchdog = setInterval(() => {
            if (!playbackStarted || player.ended || player.seeking) return;
            if ((hlsInstance || usingNativeHls) && needsBufferPause() && !player.paused) {
                pausedForBuffer = true;
                player.pause();
                showRebuffering();
            } else if (pausedForBuffer && canResumeFromBuffer()) {
                pausedForBuffer = false;
                hideLoading();
                player.play().catch(() => {});
            }
        }, 500);
    }

    function stopBufferWatchdog() {
        if (bufferWatchdog) {
            clearInterval(bufferWatchdog);
            bufferWatchdog = null;
        }
        if (encodeLeadTimer) {
            clearInterval(encodeLeadTimer);
            encodeLeadTimer = null;
        }
        pausedForBuffer = false;
        encodedAheadSec = Infinity;
        lastEncodedSeconds = Infinity;
        hlsStreamId = null;
        hlsCopyMode = false;
        usingNativeHls = false;
        if (liveEdgeFixInterval) {
            clearInterval(liveEdgeFixInterval);
            liveEdgeFixInterval = null;
        }
    }

    async function pollEncodeLead() {
        if (!hlsStreamId) return;
        try {
            const res = await fetch(`/hls/${hlsStreamId}/status`);
            if (!res.ok) return;
            const { encodedSeconds } = await res.json();
            lastEncodedSeconds = encodedSeconds;
            encodedAheadSec = encodedSeconds - player.currentTime;
        } catch (_) {}
    }

    function startEncodeLeadWatch() {
        if (encodeLeadTimer) clearInterval(encodeLeadTimer);
        pollEncodeLead();
        encodeLeadTimer = setInterval(pollEncodeLead, 2000);
    }

    function needsBufferPause() {
        if (!hlsInstance && !usingNativeHls) return false;
        if (usingNativeHls) {
            // Native HLS: only gate on the encoder falling behind, never on
            // buffered ranges (unreliable on iOS)
            return Boolean(hlsStreamId) && encodedAheadSec < hlsEncodeLeadSec() / 2;
        }
        const ahead = bufferedAhead();
        if (ahead < hlsMinPlayBufferSec()) return true;
        if (hlsStreamId && encodedAheadSec < hlsEncodeLeadSec()) return true;
        return false;
    }

    function canResumeFromBuffer() {
        if (usingNativeHls) {
            return !hlsStreamId || encodedAheadSec >= hlsEncodeLeadSec();
        }
        return bufferedAhead() >= hlsResumeBufferSec()
            && (!hlsStreamId || encodedAheadSec >= hlsEncodeLeadSec());
    }

    function bindPlayerRecovery() {
        if (playerListenersBound) return;
        playerListenersBound = true;
        player.addEventListener('waiting', () => {
            showRebuffering();
            scheduleStallRecovery();
        });
        player.addEventListener('stalled', scheduleStallRecovery);
        player.addEventListener('canplay', () => { if (!pausedForBuffer && playbackStarted) hideLoading(); });
        player.addEventListener('playing', () => {
            playbackStarted = true;
            if (!pausedForBuffer) hideLoading();
        });
    }

    function playDirect(url, onErrorFallback) {
        playbackStarted = false;
        mediaRecoveries = 0;
        stopBufferWatchdog();
        showInitialLoading('Loading...');
        player.src = url;
        bindPlayerRecovery();
        const onProgress = () => tryStartPlayback(MP4_START_BUFFER_SEC);
        player.addEventListener('progress', onProgress);
        player.addEventListener('canplay', onProgress);
        player.addEventListener('canplaythrough', onProgress, { once: true });
        // iOS won't fetch any data until play() is called — kick it if nothing loaded
        setTimeout(() => {
            if (!playbackStarted && player.readyState === 0) tryNativePlay();
        }, 1500);
        setTimeout(() => {
            if (!playbackStarted && player.readyState >= 2) tryStartPlayback(0.5);
        }, 8000);
        player.addEventListener('error', () => {
            if (onErrorFallback) onErrorFallback();
        }, { once: true });
    }

    // Seeking past the encoded point would stall forever — instead restart
    // the transcode at the target time (server -ss) and play the new session.
    function bindSeekRestart() {
        if (seekRestartBound) return;
        seekRestartBound = true;
        player.addEventListener('seeking', () => {
            if (!hlsStreamId || seekRestartInProgress || !playbackStarted) return;
            if (!isFinite(lastEncodedSeconds)) return;
            const target = player.currentTime;
            if (target > lastEncodedSeconds + 4) {
                restartStreamAt(streamTimeOffset + target);
            }
        });
    }

    async function restartStreamAt(absSeconds) {
        seekRestartInProgress = true;
        try {
            const tvfile = new URLSearchParams(window.location.search).get('tvfile');
            showInitialLoading('Seeking...');
            const endpoint = (tvfile
                ? '/start-stream?tvfile=' + encodeURIComponent(tvfile)
                : '/start-stream?file=' + encodeURIComponent(file))
                + '&t=' + Math.max(0, Math.floor(absSeconds));
            const res = await fetch(endpoint);
            if (!res.ok) { showError('Seek failed'); return; }
            const data = await res.json();
            if (data.mode === 'mp4') {
                streamTimeOffset = 0;
                playDirect(data.url);
                player.addEventListener('loadedmetadata', () => {
                    try { player.currentTime = absSeconds; } catch (_) {}
                }, { once: true });
                return;
            }
            streamTimeOffset = data.startOffset || 0;
            playHls(data.url, data.streamId, data.copyMode);
        } catch (_) {
            showError('Seek failed');
        } finally {
            seekRestartInProgress = false;
        }
    }

    function tryNativePlay() {
        const p = player.play();
        if (p && p.catch) p.catch(() => showTapToPlay());
    }

    function showTapToPlay() {
        if (!player.paused) return;
        loading.classList.remove('rebuffer');
        loading.style.display = 'flex';
        loading.textContent = '▶ Tap to play';
        const onTap = () => {
            loading.removeEventListener('click', onTap);
            showInitialLoading('Loading...');
            tryNativePlay();
        };
        loading.addEventListener('click', onTap);
    }

    function playHls(url, streamId, copyMode) {
        playbackStarted = false;
        mediaRecoveries = 0;
        hlsStreamId = streamId || null;
        hlsCopyMode = Boolean(copyMode);
        encodedAheadSec = Infinity;
        lastEncodedSeconds = Infinity;
        usingNativeHls = false;
        bindSeekRestart();
        if (window.Hls && Hls.isSupported()) {
            if (hlsInstance) hlsInstance.destroy();
            hlsInstance = new Hls({
                enableWorker: true,
                startPosition: 0,
                maxBufferLength: 180,
                maxMaxBufferLength: 600,
                maxBufferHole: 0.5,
                startFragPrefetch: true,
                lowLatencyMode: false,
                liveSyncDuration: 45,
                liveMaxLatencyDuration: 120,
                maxLiveSyncPlaybackRate: 1,
                manifestLoadingMaxRetry: 8,
                levelLoadingMaxRetry: 8,
                fragLoadingMaxRetry: 10,
                fragLoadingMaxRetryTimeout: 15000,
            });
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(player);
            bindPlayerRecovery();
            startBufferWatchdog();
            if (hlsStreamId) startEncodeLeadWatch();
            showInitialLoading('Loading...');

            const onBuffered = () => {
                if (!playbackStarted && player.currentTime > 3) player.currentTime = 0;
                tryStartPlayback(hlsStartBufferSec(), true);
            };
            hlsInstance.on(Hls.Events.BUFFER_APPENDED, onBuffered);
            hlsInstance.on(Hls.Events.FRAG_BUFFERED, onBuffered);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                player.currentTime = 0;
                hlsInstance.startLoad(0);
            });

            hlsInstance.on(Hls.Events.ERROR, (_, data) => {
                if (!data.fatal) return;
                if (data.type === Hls.ErrorTypes.MEDIA_ERROR && mediaRecoveries < 1) {
                    mediaRecoveries++;
                    hlsInstance.recoverMediaError();
                    scheduleStallRecovery();
                    return;
                }
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                    hlsInstance.startLoad();
                    return;
                }
                showError('Stream failed to load');
            });
            return;
        }
        if (player.canPlayType('application/vnd.apple.mpegurl')) {
            // iOS/Safari native HLS. Two iOS rules shape this code:
            // 1. iOS ignores preload and won't fetch ANY media data until play()
            //    is called — so waiting for canplay before playing deadlocks.
            // 2. Un-muted autoplay may be rejected without a user gesture — then
            //    we show a tap-to-play prompt; the tap satisfies the gesture rule.
            usingNativeHls = true;
            playbackStarted = false;
            bindPlayerRecovery();
            startBufferWatchdog();
            if (hlsStreamId) startEncodeLeadWatch();
            showInitialLoading('Loading...');
            player.src = url;
            player.addEventListener('playing', () => {
                playbackStarted = true;
                if (!pausedForBuffer) hideLoading();
            });
            tryNativePlay();
            return;
        }
        showError('HLS not supported in this browser');
    }

    async function startHlsStream() {
        playbackStarted = false;
        mediaRecoveries = 0;
        streamTimeOffset = 0;
        stopBufferWatchdog();
        const tvfile = new URLSearchParams(window.location.search).get('tvfile');
        showInitialLoading('Preparing stream...');
        player.removeAttribute('src');
        player.load();

        const endpoint = tvfile
            ? '/start-stream?tvfile=' + encodeURIComponent(tvfile)
            : '/start-stream?file=' + encodeURIComponent(file);
        const res = await fetch(endpoint);
        if (!res.ok) {
            showError('Could not start stream');
            return;
        }
        const data = await res.json();
        if (data.mode === 'mp4') {
            playDirect(data.url);
            return;
        }
        playHls(data.url, data.streamId, data.copyMode);
    }

    async function startStream() {
        const tvfile = new URLSearchParams(window.location.search).get('tvfile');
        const target = tvfile || file;
        if (!target) {
            showError('No file specified');
            return;
        }

        if (target.toLowerCase().endsWith('.mp4')) {
            const token = await getMediaToken();
            const url = withToken(tvfile
                ? '/tv-media/' + mediaUrl(tvfile)
                : '/stream-mp4?file=' + encodeURIComponent(file), token);
            playDirect(url, () => startHlsStream());
            return;
        }

        await startHlsStream();
    }

    let hideTimer;
    function showControls() {
        document.body.classList.add('show-controls');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => document.body.classList.remove('show-controls'), 3000);
    }

    document.addEventListener('mousemove', showControls);
    document.addEventListener('touchstart', showControls);
    player.addEventListener('dblclick', toggleFullscreen);
    document.addEventListener('fullscreenchange', showControls);
    document.addEventListener('webkitfullscreenchange', showControls);

    applyFitMode();
    showControls();
    ensureAuth().then(ok => { if (ok) startStream(); });

    // Fullscreen helps tab/screen cast fill the TV instead of mirroring a small window
    try {
        const fsAttempt = enterFullscreen();
        if (fsAttempt && fsAttempt.catch) fsAttempt.catch(() => {});
    } catch (_) {}
</script>
</body>
</html>
