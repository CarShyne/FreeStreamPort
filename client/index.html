    </button>
    <button class="gear-btn" onclick="openSettings()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
</header>

<!-- Settings Modal -->
<div id="settings-modal" style="display:none">
    <div class="settings-overlay" onclick="closeSettings()"></div>
    <div class="settings-card">
        <div class="settings-header">
            <h2>Settings <span id="app-version" class="settings-version"></span></h2>
            <button class="settings-close" onclick="closeSettings()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="settings-body">
            <!-- Media Folders -->
            <div class="settings-section">
                <div class="settings-section-title">Media Folders</div>
                <div id="media-folders-list"></div>
                <button class="settings-add-btn" onclick="addFolder()">+ Add Folder</button>
            </div>

            <div class="settings-divider"></div>

            <!-- TV Folder -->
            <div class="settings-section">
                <div class="settings-section-title">TV Shows Folder</div>
                <div class="settings-row">
                    <input class="settings-input" id="tv-folder" type="text" placeholder="/path/to/tv shows">
                </div>
            </div>

            <div class="settings-divider"></div>

            <!-- Audio Language -->
            <div class="settings-section">
                <div class="settings-section-title">Preferred Audio Language</div>
                <div class="settings-row">
                    <select class="settings-select" id="audio-lang">
                        <option value="eng">English</option>
                        <option value="spa">Spanish</option>
                        <option value="fra">French</option>
                        <option value="deu">German</option>
                        <option value="ita">Italian</option>
                        <option value="jpn">Japanese</option>
                        <option value="kor">Korean</option>
                    </select>
                    <span class="settings-hint">Auto-select audio track by language</span>
                </div>
            </div>

            <div class="settings-divider"></div>

            <!-- TMDB Key -->
            <div class="settings-section">
                <div class="settings-section-title">TMDB API Key</div>
                <div class="settings-row">
                    <input class="settings-input" id="tmdb-key" type="password" placeholder="Your TMDB API key">
                </div>
            </div>

            <div class="settings-divider"></div>

            <!-- Port -->
            <div class="settings-section">
                <div class="settings-section-title">Server Port</div>
                <div class="settings-row">
                    <input class="settings-input" id="server-port" type="number" placeholder="3000" style="width:100px">
                    <span class="settings-hint">Requires restart</span>
                </div>
            </div>
        </div>

        <div class="settings-footer">
            <button class="settings-save-btn" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>
</div>

<div class="grid" id="grid"></div>

<div id="modal">
    <div class="modal-box">
        <img id="m-poster" src="" alt="">
        <div class="modal-info">
            <h2 id="m-title"></h2>
            <div class="modal-meta">
                <span id="m-year"></span>
                <span id="m-rating"></span>
            </div>
            <div class="modal-overview" id="m-overview"></div>
            <div class="modal-actions">
                <div class="modal-actions-row">
                    <button class="btn-play" onclick="playMovie()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        Play
                    </button>
                    <button class="btn-play btn-download" onclick="downloadMovie()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
                        Download
                    </button>
                </div>
            </div>
        </div>
        <button class="modal-close" onclick="closeModal()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
    </div>
</div>

</div><!-- /app-shell -->

<div id="landing-page">
    <img src="/landing.png?v=1.0.11" alt="">
</div>

<div id="login-modal">
    <div class="settings-overlay"></div>
    <div class="settings-card login-card">
        <div class="settings-body" style="padding-top:16px">
            <form id="login-form" onsubmit="submitLogin(event)">
                <div class="login-field">
                    <label for="login-user">Username</label>
                    <input class="settings-input" id="login-user" type="text" name="username" autocomplete="username" required>
                </div>
                <div class="login-field">
                    <label for="login-pass">Password</label>
                    <input class="settings-input" id="login-pass" type="password" name="password" autocomplete="current-password" required>
                </div>
                <label class="login-remember">
                    <input type="checkbox" id="login-remember" checked>
                    <span>Keep me signed in on this device (90 days)</span>
                </label>
                <p id="login-error" class="login-error"></p>
            </form>
        </div>
        <div class="settings-footer">
            <button type="submit" form="login-form" class="settings-save-btn" id="login-submit">Sign In</button>
        </div>
    </div>
</div>

<script src="app.js?v=1.0.10"></script>

</body>
</html>
